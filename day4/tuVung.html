undefined : giá trị do trang web đặt cho biến -> xảy ra khi chúng ta khởi tạo biến bằng let nhưng chưa gán giá trị cho biến đó
NaN : Not a Number -> giá trị trả về khi thực hiện phép toán với 1 giá trị không phải là số
+ truly -> các giá trị trả về true : các giá trị còn lại ngoài các giá trị falsy trên vd : mảng rỗng , đối tượng rỗng , chuỗi không rỗng , số khác không...
