<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .tabs-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15);
            width: 500px;
            height: 300px;
            overflow: hidden;
            transition: all 0.2s;
        }
        .tabs-header {
            display: flex;
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            gap: 8px;
            padding: 0 20px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 16px 24px;
            font-size: 1rem;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .tab-btn:hover {
            color: #1e293b;
            background: #f1f5f9;
        }
        .tab-btn.active {
            color: #3b82f6;
        }
    </style>
    <title>Bài 10</title>
</head>
<body>
    <div class="tabs-container">
        <div class="tabs-header">
            <button class="tab-btn">Tab 1</button>
            <button class="tab-btn">Tab 2</button>
            <button class="tab-btn">Tab 3</button>
        </div>
        <div class="tab-content">

        </div>
    </div>
    <script>
        // các hàm tạo ra tab mới dựa trên sự kiện 
        function createTab1(){
            let container = document.createElement(`div`);

            let title = document.createElement(`h2`);
            title.textContent = `tab 1`; 
            container.appendChild(title)

            return container;
        }

        function createTab2(){
            let container = document.createElement(`div`);

            let title = document.createElement(`h2`);
            title.textContent = `tab 2`; 
            container.appendChild(title);

            return container;
        }

        function createTab3(){
            let container = document.createElement(`div`);

            let title = document.createElement(`h2`);
            title.textContent = `tab 3`; 
            container.appendChild(title);

            return container
        }

        // state 
        let tabsContent = [createTab1 , createTab2 , createTab3];
        let tabActive = 0;

        function render(){
            let tabBlock = document.querySelector(`.tab-content`);
            tabBlock.innerHTML = ``;

            tabBlock.appendChild(tabsContent[tabActive]())
        }

        // hàm thay đổi state
        function runTab(tab){
            tabActive = tab;
            render();
        }

        // sự kiện thay đổi state
        let tabsBtn = document.querySelectorAll(`.tab-btn`);
        tabsBtn.forEach((btn , index) => {
            btn.addEventListener(`click` , () => {
                runTab(index);
            })
        })

        // gọi render lần đầu
        render();

    </script>
</body>
</html>
