<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .container{
            display:flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .clock{
            padding:20px;
            display:flex;
            gap:5px;
            border-width: 2px;
            border-radius: 50%;
        }
    </style>
    <title>Bài 9</title>
</head>
<body>
    <div class="container">
        <h1>Đồng hồ bấm giờ</h1>
        <div class="clock">
            <h2 class="clock-hour">00 :</h2>
            <h2 class="clock-min">00 :</h2>
            <h2 class="clock-seconds">00</h2>
        </div>
        <div class="btn">
            <button class="btn-start">Start</button>
            <button class="btn-pause">Pause</button>
            <button class="btn-reset">Reset</button>
        </div>
    </div>

    <script>
        // state
        let hours = 0;
        let mins = 0;
        let seconds = 0;

        let idInterval = null;

        // hàm render 

        function render(){
            let clock = document.querySelector(`.clock`);
            clock.innerHTML = ``;

            let clockHour = document.createElement(`h2`);
            clockHour.className = `clock-hour`;
            clockHour.textContent = `${String(hours).padStart(2 , `0`)} :`;
            clock.appendChild(clockHour);

            let clockMin = document.createElement(`h2`);
            clockMin.className = `clock-min`;
            clockMin.textContent = `${String(mins).padStart(2 , `0`)} :`;
            clock.appendChild(clockMin);

            let clockSeconds = document.createElement(`h2`);
            clockSeconds.className = `clock-seconds`;
            clockSeconds.textContent = String(seconds).padStart(2 , `0`);
            clock.appendChild(clockSeconds);

        }

        // Hàm thay đổi state
        function runTime(){
            if(!idInterval) return;
            idInterval = setInterval(()=>{
                seconds++;
                if(seconds >= 60){
                    seconds = 0;
                    mins++;
                } 
                if(mins >= 60){
                    mins = 0;
                    hours++;
                }
                render();
            },1000)
        }

        function pauseTime(){
            if(idInterval){
                clearInterval(idInterval);
                idInterval = null;
                render();
            }
        }

        function resetTime(){
            if(idInterval){
                clearInterval(idInterval);
                idInterval = null;
            }
            seconds = 0;
            mins = 0;
            hours = 0;
            
            render();
        }
        
        
        // Sự kiện thay đổi state 
        const btnStart = document.querySelector(`.btn-start`);
        const btnPause = document.querySelector(`.btn-pause`);
        const btnReset = document.querySelector(`.btn-reset`);

        btnStart.addEventListener(`click` , () => { runTime()})
        btnPause.addEventListener(`click` , () => { pauseTime()});
        btnReset.addEventListener(`click` , () => { resetTime()});

    </script>
</body>
</html>
