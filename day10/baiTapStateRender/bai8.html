<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 8</title>
    <style>
        body {
            font-family: system-ui, 'Segoe UI', sans-serif;
            background: #eef2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .form-container {
            background: white;
            max-width: 480px;
            width: 100%;
            padding: 28px 32px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h2 {
            margin-top: 0;
            text-align: center;
            color: #1e293b;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #0f172a;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .error {
            color: #dc2626;
            font-size: 0.8rem;
            margin-top: 4px;
            display: block;
        }
        button {
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover {
            background: #2563eb;
        }
        .success {
            background: #dcfce7;
            color: #15803d;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        hr {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="form-container">
            <h2>📝 Đăng ký tài khoản</h2>
            <div class="success"></div>
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" value="" placeholder="vd: nguyenvana">
                <span class="error">a</span>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" value="" placeholder="hello@example.com">
                <span class="error"></span>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" value="" placeholder="Ít nhất 6 ký tự">
                <span class="error"></span>
            </div>
            <button id="submitBtn">Đăng ký</button>
        </div>
    </div>
    
    <script>
        // ----- STATE -----
        let formData = {
            username: '',
            email: '',
            password: ''
        };
        let err = {
            username: '',
            email: '',
            password: ''
        };
        let successMessage = '';

        // hàm render 
        function render(){
            let app = document.querySelector(`#app`);
            app.innerHTML = `
                <div class="form-container">
                    <h2>📝 Đăng ký tài khoản</h2>
                    <div class="success">${successMessage}</div>
                    <div class="form-group">
                        <label>Tên đăng nhập</label>
                        <input type="text" id="username" value="${formData[`username`]}" placeholder="vd: nguyenvana">
                        <span class="error">${err[`username`]}</span>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" value="${formData[`email`]}" placeholder="hello@example.com">
                        <span class="error">${err[`email`]}</span>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="password" value="${formData[`password`]}" placeholder="Ít nhất 6 ký tự">
                        <span class="error">${err[`password`]}</span>
                    </div>
                    <button id="submitBtn">Đăng ký</button>
                </div>
            `;

            let inputUsername = document.querySelector(`#username`);
            let inputEmail = document.querySelector(`#email`);
            let inputPass = document.querySelector(`#password`);
            let btnSubmit = document.querySelector(`#submitBtn`);
            btnSubmit.addEventListener(`click` , () => {
                isSuccess(inputUsername.value , inputEmail.value , inputPass.value);
            })

        }

        // các hàm kiểm tra lỗi 
        function isUsername(value){
            formData[`username`] = value;
            if(value.trim() === ``){
                err[`username`] = `Lỗi username không được để trống`;
                return false;
            } 
            err[`username`] = ``;
            return true;
        }

        function isEmail(value){
            formData[`email`] = value;
            if(value.trim() === ``){
                err[`email`] = `Lỗi email không được để trống`;
                return false;
            }
            if(!value.includes(`@`)){
                err[`email`] = `Lỗi email thiếu kí tự '@'`;
                return false;
            } 
            if(value.slice(-4) !== `.com`){
                err[`email`] = `Lỗi email thiếu kí tự '.com'`;
                return false;
            } 
            err[`email`] = ``;
            return true;
        }

        function isPassword(value){
            formData[`password`] = value;
            if(value.trim() === ``){
                err[`password`] = `Lỗi password không được để trống`;
                return false;
            }
            if(value.length <= 6){
                err[`password`] = `Lỗi password không đủ 6 kí tự`;
                return false;
            }
            err[`password`] = ``;
            return true;
        }

        function isSuccess(user , mail , pass){
            let a = isUsername(user);
            let b = isEmail(mail);
            let c = isPassword(pass);
            if(a && b && c){
                console.log(1)
                successMessage = `Đăng kí thành công !!!`;
                render();
                return;
            }
            console.log(2)
            successMessage = `LỖI`;
            render();
        }

        // gọi render lần đầu 
        render();

    </script>
</body>
</html>
