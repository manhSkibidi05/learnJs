<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Bài 6</title>
</head>
<body>
    <h1 class="page-show">Trang 1</h1>
    <button class="btn-pre">Trang trước</button>
    <button class="btn-next">Trang sau</button>
    <h2>Thêm sản phẩm</h2>
    <input type="text" name="product-name" id="product-name">
    <input type="number" name="product-price" id="product-price">
    <button class="btn-add" type="button">Thêm</button>
    <div class="container">

    </div>
    <script>
        // các phần tử state 
        let products = [
            {id : 0 , name : `Sản phẩm 0` , price : 1},
            {id : 1 , name : `Sản phẩm 1` , price : 1},
            {id : 2 , name : `Sản phẩm 2` , price : 1},
            {id : 3 , name : `Sản phẩm 3` , price : 1},
            {id : 4 , name : `Sản phẩm 4` , price : 1},
            {id : 5 , name : `Sản phẩm 5` , price : 1},
            {id : 6 , name : `Sản phẩm 6` , price : 1},
            {id : 7 , name : `Sản phẩm 7` , price : 1},
            {id : 8 , name : `Sản phẩm 8` , price : 1},
            {id : 9 , name : `Sản phẩm 9` , price : 1},
            {id : 10 , name : `Sản phẩm 10` , price : 1},
            {id : 11 , name : `Sản phẩm 11` , price : 1},
            {id : 12 , name : `Sản phẩm 12` , price : 1},
            {id : 13 , name : `Sản phẩm 13` , price : 1}
        ];
        let currentPage = 1;

        // định nghĩa hàm render 
        function render(){
            let pageShow = document.querySelector(`.page-show`);
            pageShow.textContent = `Trang ${currentPage}`;

            // hiện thị danh sách sản phẩm
            let container = document.querySelector(`.container`);
            container.innerHTML = ``;

            let productsFilter = [...products];

            for(let i = (currentPage - 1) * 5 ; i < currentPage * 5 ; i++){
                if(!productsFilter[i]) return;
                container.appendChild(createElement(productsFilter[i][`id`] , productsFilter[i][`name`] , productsFilter[i][`price`]));
            }
        }

        function createElement(id , name , price){
            let card = document.createElement(`div`);
            card.className = `card-product`;

            let productName = document.createElement(`h3`);
            productName.textContent = name;
            card.appendChild(productName);

            let productPrice = document.createElement(`span`);
            productPrice.textContent = `Giá : ${price} vnd`;
            card.appendChild(productPrice);

            return card;
        }


        // định nghĩa hàm ảnh hưởng tới state
        function addProduct(product){
            products.push(product);
            let totalPage = Math.ceil(products.length / 5);
            currentPage = totalPage;
            render();
        }

        function previousPage(){
            if(currentPage <= 1) return;
            currentPage--;
            render();
        }

        function nextPage(){
            let totalPage = Math.ceil(products.length / 5) ;
            if(currentPage >= totalPage) return;
            currentPage++;
            render();
        }

        // sự kiện ảnh hưởng tới state

        let btnPre = document.querySelector(`.btn-pre`);
        btnPre.addEventListener(`click` , () => { previousPage()});
            
        let btnNext = document.querySelector(`.btn-next`);
        btnNext.addEventListener(`click` , () => { nextPage()});

        let productName = document.querySelector(`#product-name`);
        let productPrice = document.querySelector(`#product-price`);
        let btnAdd = document.querySelector(`.btn-add`);
        btnAdd.addEventListener(`click` , (e) => {
            if(productName.value.trim() !== `` && productPrice.value > 0 && !isNaN(productPrice.value)){
                let name = productName.value.trim();
                let id = products.length;
                let price = productPrice.value;
                let newProduct = {
                    id : id,
                    name : name ,
                    price : price
                }
                addProduct(newProduct);
            }
            productName.value = ``;
            productPrice.value = ``;
        })

        render();

    </script>
</body>
</html>
