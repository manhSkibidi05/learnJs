<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 10 - Tabs nâng cao (localStorage + hiệu ứng)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .tabs-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 700px;
            overflow: hidden;
            transition: all 0.2s;
        }
        .tabs-header {
            display: flex;
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            gap: 8px;
            padding: 0 20px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 16px 24px;
            font-size: 1rem;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .tab-btn:hover {
            color: #1e293b;
            background: #f1f5f9;
        }
        .tab-btn.active {
            color: #3b82f6;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #3b82f6;
            border-radius: 3px 3px 0 0;
        }
        /* vùng nội dung với hiệu ứng chuyển tiếp */
        .tab-content-wrapper {
            padding: 24px;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tab-content {
            width: 100%;
            animation: fadeSlide 0.3s ease-out;
        }
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(48px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* style cho các nội dung bên trong */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .card-item {
            background: #f1f5f9;
            padding: 12px 18px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge {
            background: #3b82f6;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        button.small-btn {
            background: #e2e8f0;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        button.small-btn:hover {
            background: #cbd5e1;
        }
        .info-text {
            line-height: 1.5;
            color: #1e293b;
        }
        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
            padding: 12px;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
<div id="app-root"></div>

<script>
    // ---------- STATE ----------
    let activeTab = 0;          // 0 = Tab 1, 1 = Tab 2, 2 = Tab 3
    const STORAGE_KEY = 'app_active_tab';

    // ---------- HÀM TẠO NỘI DUNG CHO TỪNG TAB (TRẢ VỀ DOM ELEMENT) ----------
    function createTab1Content() {
        const container = document.createElement('div');
        container.className = 'tab-content';
        container.innerHTML = `
            <h2 style="margin-top:0">🌟 Chào mừng đến Tab 1</h2>
            <p class="info-text">Đây là nội dung được tạo bằng <strong>createElement</strong> + innerHTML an toàn. Bạn có thể thêm bất kỳ thành phần phức tạp nào.</p>
            <div class="card-list">
                <div class="card-item">
                    <span>📁 Dự án JavaScript</span>
                    <span class="badge">Hoàn thành 80%</span>
                </div>
                <div class="card-item">
                    <span>🎨 Học React</span>
                    <span class="badge">Đang tiến hành</span>
                </div>
                <div class="card-item">
                    <span>🚀 Xây dựng portfolio</span>
                    <span class="badge">Sắp bắt đầu</span>
                </div>
            </div>
            <button class="small-btn" id="demoBtnTab1">Nhấn thử (console log)</button>
        `;
        // gắn sự kiện riêng cho nút bên trong tab 1 (ví dụ)
        const btn = container.querySelector('#demoBtnTab1');
        if (btn) {
            btn.addEventListener('click', () => console.log('Bạn đã click nút trong Tab 1!'));
        }
        return container;
    }

    function createTab2Content() {
        const container = document.createElement('div');
        container.className = 'tab-content';
        container.innerHTML = `
            <h2>⚙️ Cài đặt & Tuỳ chọn</h2>
            <div class="setting-row">
                <span>🌓 Chế độ tối</span>
                <button class="small-btn" id="darkModeBtn">Bật thử (console)</button>
            </div>
            <div class="setting-row">
                <span>🔔 Thông báo</span>
                <button class="small-btn" id="notifyBtn">Hiển thị thông báo</button>
            </div>
            <p class="info-text" style="margin-top:20px">Mỗi nút đều có thể gắn sự kiện riêng mà không cần dùng innerHTML thuần.</p>
        `;
        const darkBtn = container.querySelector('#darkModeBtn');
        const notifyBtn = container.querySelector('#notifyBtn');
        if (darkBtn) {
            darkBtn.addEventListener('click', () => console.log('[Demo] Chế độ tối (chưa thực sự áp dụng)'));
        }
        if (notifyBtn) {
            notifyBtn.addEventListener('click', () => alert('🔔 Đây là thông báo từ Tab 2!'));
        }
        return container;
    }

    function createTab3Content() {
        const container = document.createElement('div');
        container.className = 'tab-content';
        // tạo danh sách động bằng JavaScript thuần (không dùng innerHTML phức tạp)
        const title = document.createElement('h2');
        title.textContent = '📊 Thống kê nhanh';
        container.appendChild(title);

        const statsList = document.createElement('ul');
        statsList.style.listStyle = 'none';
        statsList.style.padding = '0';
        const items = [
            { label: 'Tổng số bài tập đã làm', value: 24 },
            { label: 'Số giờ học JS', value: 128 },
            { label: 'Dự án đã hoàn thành', value: 5 }
        ];
        items.forEach(item => {
            const li = document.createElement('li');
            li.style.display = 'flex';
            li.style.justifyContent = 'space-between';
            li.style.padding = '10px 0';
            li.style.borderBottom = '1px solid #e2e8f0';
            li.innerHTML = `<span>${item.label}</span><strong>${item.value}</strong>`;
            statsList.appendChild(li);
        });
        container.appendChild(statsList);

        const refreshBtn = document.createElement('button');
        refreshBtn.className = 'small-btn';
        refreshBtn.textContent = '🔄 Làm mới thống kê (demo)';
        refreshBtn.style.marginTop = '16px';
        refreshBtn.addEventListener('click', () => {
            alert('Thống kê chỉ mang tính minh hoạ, có thể kết nối API thật!');
        });
        container.appendChild(refreshBtn);
        return container;
    }

    // Mảng chứa các hàm tạo nội dung theo thứ tự tab
    const tabContentCreators = [createTab1Content, createTab2Content, createTab3Content];
    const tabLabels = ['📘 Tab 1', '⚙️ Tab 2', '📊 Tab 3'];

    // ---------- HÀM RENDER TOÀN BỘ GIAO DIỆN (state -> DOM) ----------
    function render() {
        const root = document.getElementById('app-root');
        if (!root) return;

        // Xóa nội dung cũ
        root.innerHTML = '';

        // 1. Tạo container chính
        const container = document.createElement('div');
        container.className = 'tabs-container';

        // 2. Tạo header tabs
        const header = document.createElement('div');
        header.className = 'tabs-header';

        tabLabels.forEach((label, idx) => {
            const btn = document.createElement('button');
            btn.textContent = label;
            btn.className = 'tab-btn';
            if (idx === activeTab) btn.classList.add('active');
            btn.addEventListener('click', () => {
                if (activeTab === idx) return;
                activeTab = idx;
                // lưu lại vào localStorage
                localStorage.setItem(STORAGE_KEY, activeTab);
                render();  // re-render toàn bộ
            });
            header.appendChild(btn);
        });

        // 3. Vùng nội dung (có wrapper để chứa hiệu ứng)
        const contentWrapper = document.createElement('div');
        contentWrapper.className = 'tab-content-wrapper';

        // Lấy nội dung tab hiện tại bằng function tạo DOM riêng
        const currentContent = tabContentCreators[activeTab]();
        contentWrapper.appendChild(currentContent);

        // 4. Footer nhỏ (tuỳ chọn)
        const footer = document.createElement('footer');
        footer.textContent = '✨ State được lưu vào localStorage - reload vẫn nhớ tab bạn đã chọn';

        // Ghép tất cả
        container.appendChild(header);
        container.appendChild(contentWrapper);
        container.appendChild(footer);
        root.appendChild(container);
    }

    // ---------- KHỞI TẠO: ĐỌC STATE TỪ localStorage ----------
    function loadStoredTab() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored !== null) {
            const parsed = parseInt(stored, 10);
            if (!isNaN(parsed) && parsed >= 0 && parsed < tabLabels.length) {
                activeTab = parsed;
            }
        }
    }

    // ---------- CHẠY ỨNG DỤNG ----------
    loadStoredTab();
    render();
</script>
</body>
</html>
