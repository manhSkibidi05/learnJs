<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: gray;
            color:#fafafc;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }

        .search-box {
            width: 100%;
            max-width: 400px;
            position: relative;
            margin-bottom: 10px;
        }
        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: 60px;
            background: white;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }
        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            pointer-events: none;
        }

        /* Container để demo - có thể chứa nhiều card */
        .products-grid {
            display : flex;
            flex-wrap: wrap;
            gap:20px;
        }


        /* CARD SẢN PHẨM */
        .product-card {
            width:300px;
            height:500px;
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05), 0 6px 6px rgba(0, 0, 0, 0.03);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            flex-direction: column;
            
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15);
        }

        /* ẢNH sản phẩm */
        .card-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background-color: #f8f9fa;
            display: block;
            transition: transform 0.4s ease;
        }

        .image-wrapper {
            overflow: hidden;
            background: #fafafc;
        }

        .product-card:hover .card-image {
            transform: scale(1.02);
        }

        /* Nội dung card */
        .card-content {
            padding: 1.2rem 1.2rem 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        /* Tiêu đề + danh mục */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .product-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.3;
            margin-right: 0.5rem;
        }

        .product-category {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #eef2ff;
            color: #1e40af;
            padding: 0.25rem 0.7rem;
            border-radius: 30px;
            white-space: nowrap;
        }

        /* Giá */
        .product-price {
            font-size: 1.6rem;
            font-weight: 800;
            color: #0f172a;
            display: inline-flex;
            align-items: baseline;
            gap: 4px;
        }

        .product-price::before {
            content: "₫";
            font-size: 1rem;
            font-weight: 500;
            color: #3b82f6;
        }

        /* Mô tả */
        .product-description {
            font-size: 0.85rem;
            line-height: 1.45;
            color: #475569;
            border-top: 1px solid #e9edf2;
            padding-top: 0.7rem;
            margin-top: 0.2rem;
            display: -webkit-box;
            line-clamp: 3;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Nút hành động (tuỳ chọn) */
        .card-action {
            margin-top: 0.6rem;
        }

        .btn-buy {
            background: #1e293b;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.6rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            font-family: inherit;
        }

        .btn-buy:hover {
            background: #0f172a;
        }

        /* Responsive nhỏ */
        @media (max-width: 640px) {
            .products-grid {
                gap: 1.2rem;
            }
            .card-content {
                padding: 1rem;
            }
            .product-price {
                font-size: 1.4rem;
            }
        }
    </style>
    <title>Bài 2</title>
</head>
<body>
    <!-- Bài 2 : Tìm kiếm sản phẩm (fake store api) -->
    <div class="search-box">
        <input type="text" name="" id="search-input">
    </div>
    
    <div class="products-grid">
        <!-- Card sản phẩm mẫu 1 -->
        
    </div>
    <script>
        let productsAll = [];
        let keyWord = '';

        let container = document.querySelector('.products-grid');
        let search = document.getElementById('search-input');

        async function getProduct(url){
            container.innerHTML = '<h2> Đang chờ ...</h2>';
            try{
                let res = await fetch(url);
                if(!res.ok) throw new Error(`Lỗi http : ${url}`);
                let datas = await res.json();
                productsAll = datas;
                render(datas);
            }catch(err){
                container.innerHTML = `<h2> ${err.message}</h2>`;
            }
        }

        function render(products){
            container.innerHTML = '';
            let productsFilter = products
            if(keyWord.trim() !== ''){
                productsFilter = products.filter(prd => prd?.title.toLowerCase().includes(keyWord.trim().toLowerCase()));
            }

            if(productsFilter.length === 0){
                container.innerHTML = '<h2> Không tồn tại sản phẩm ! </h2>'
            }else{
                container.innerHTML = productsFilter.map(prd => `
                <div class="product-card">
                    <div class="image-wrapper">
                        <img class="card-image" src="${prd?.image}" alt="Sản phẩm đồng hồ thông minh">
                    </div>
                    <div class="card-content">
                        <div class="card-header">
                            <span class="product-title">${prd?.title}</span>
                            <span class="product-category">${prd?.category}</span>
                        </div>
                        <div class="product-price">$ ${prd?.price}</div>
                        <div class="product-description">
                            ${prd?.description}
                        </div>
                        <div class="card-action">
                            <button class="btn-buy">Xem chi tiết →</button>
                        </div>
                    </div>
                </div>
                `).join('');
            }
            
        }

        function searchInput(value){
            keyWord = value;
            render(productsAll);
        }

        function debounce(func){
            let idTimeout;
            return function(...args){
                clearTimeout(idTimeout);
                idTimeout = setTimeout(() => {
                    func.apply(this , args);
                },500)
            }
        }

        const debouceInput = debounce(searchInput)
        search.addEventListener('input' , (e) => {
            container.innerHTML = '<h2>Đang tìm kiếm sản phẩm... </h2>'
            debouceInput(e.target.value)
        });

        getProduct('https://fakestoreapi.com/products')
    </script>
</body>
</html>
