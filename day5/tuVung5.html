<!-- 
    object : đối tượng 
    property : thuộc tính 
    key : tên thuộc tính
    value : giá trị thuộc tính 
    delete : delete obj[key] -> sử dụng để xóa 1 thuộc tính của 1 obj
    in operator: kiểm tra xem thuộc tính có thuộc về 1 đối tượng không tính cả các thuộc tính kế thừa
    hasOwnProperty() : phương thức kiểm tra xem thuộc tính riêng của 1 đối tượng
    for in : duyệt qua tất cả các key trong obj -> có thể lấy tất cả key và value của obj này
    Object.keys() : chuyển các key trong obj thành 1 arr -> sử dụng khi chỉ cần thao tác với tên thuộc tính
    Object.values() : chuyển các value trong obj thành 1 arr -> sử dụng khi chỉ cần thao tác với dữ liệu không quan tâm key
    Object.entries() : chuyển cả key và value thành 1 mảng con rồi lưu tất cả trong 1 mảng lớn -> sử dụng thao tác với cả key và value cùng lúc
    forEach : vòng lặp sử dụng với mảng -> mỗi vòng lặp lấy giá trị trong mảng thực hiện chạy trong 1 hàm
        -> arr.forEach(function(currentValue , index , array){
            câu lệnh thực hiện
        });
    spread operator : sao chép nông mảng -> áp dụng khi cần sao chép với các thuộc tính mang dữ liệu nguyên thủy
    đệ quy : sao chép sâu -> sử dụng khi cần sao chép obj với cả thuộc tính mang dữ liệu obj/arr 

    method : phương thức trong 1 đối tượng 
        -> khai báo kiểu cũ : tên method : function(){}
        -> khai báo hiện nay : tên method(){}
        -> arrow function : tên method : ()=>{}
    -> phương thức có thể truy cập vào dữ liệu của 1 đối tượng và thực hiện các thao tác tính toán ra 1 dữ liệu mới 

    this : từ khóa sử dụng bên trong object -> khi sử dụng this sẽ được tham chiếu đến obj mà gọi this : lúc này this có thể truy cập vào dữ liệu của obj này
    sử dụng các thuộc tính và phương thức bên trong obj

-->
