<!-- từ vựng : 
    - object : đối tượng
    - property : thuộc tính 
    - key : khóa (tên thuộc tính)
    - value : giá trị của thuộc tính
    - method : phương thức
    - this : từ khóa trỏ đến object hiện tại
    - constructor : hàm tạo
    - hasOwnProperty() : sử dụng hàm này để xác định 1 tham số riêng có thuộc đối tượng này không -> obj.hasOwnProperty(property)
    - keys : mảng các key -> tạo ra mảng với các giá trị là các key (tên thuộc tính) bằng hàm Object.keys()
    - values : mảng các value -> tạo ra mảng với các giá trị là các value bằng hàm Object.values()
    - entries : mảng 2 chiều key và value -> tạo ra mảng 2 chiều với giá trị là 1 mảng mang cả key và value của 1 thuộc tính của đối tượng bằng hàm Object.entries()
    - forEach : vòng lặp sử dụng với mảng
        + cú pháp : arr.forEach(function(currentValue , index , array){
            câu lệnh thực hiện;
        });
        -> mỗi lần lặp sẽ thực hiện hàm trên cho đến khi hết các giá trị trong mảng
        - 3 tham số của hàm gồm : currentValue -> giá trị hiện tại đang duyệt qua trong mảng -> tham số bắt buộc
        + index -> số index của giá trị hiện tại đang duyệt qua -> tham số không bắt buộc
        + array -> mảng hiện tại đang duyệt -> tham số không bắt  buộc
    - spread operator : sao chép nông 1 đối tượng -> sao chép những thuộc tính nguyên thủy thay đổi những thuộc tính đó không làm ảnh hưởng tới obj ban đầu
        -> objClone = {...objOriginal};
    - đệ quy : sử dụng đệ quy để sao chép sâu 1 đối tượng -> sao chép cả những thuộc tính obj/arr thay đổi nó không làm ảnh hưởng tới obj ban đầu
-->
